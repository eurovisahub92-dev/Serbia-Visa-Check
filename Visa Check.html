
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serbia Visa Validity Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #eef2f7;
      margin: 0;
    }

    header {
      background: #1e3a8a;
      color: white;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
    }

    header span {
      font-weight: 300;
      font-size: 14px;
    }

    .container {
      max-width: 520px;
      margin: 100px auto;
      background: white;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #1e3a8a;
      box-shadow: 0 0 0 3px rgba(30,58,138,0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #162d66;
    }

    .result {
      margin-top: 20px;
      font-weight: 600;
      font-size: 15px;
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  <div>Republic of Serbia eVisa Portal</div>
  <span>Demo System</span>
</header>

<div class="container">
  <h2>Visa Validity Checker</h2>
  <p>Enter your visa reference number to check its validity status.</p>

  <input type="text" id="visaInput" placeholder="e.g. SRB12345">
  <button onclick="checkVisa()">Check Visa Status</button>

  <div class="result" id="result"></div>
</div>

<footer>
  © 2026 Serbia Immigration Portal (Demo UI Only)
</footer>

<script>
  function checkVisa() {
    const visaNumber = document.getElementById('visaInput').value.trim();
    const resultDiv = document.getElementById('result');

    if (!visaNumber) {
      resultDiv.innerHTML = '⚠️ Please enter a visa reference number';
      resultDiv.style.color = 'orange';
      return;
    }

    // Simulated dataset
    const validVisas = ['SRB12345', 'SRB67890', 'SRB99999'];

    if (validVisas.includes(visaNumber)) {
      resultDiv.innerHTML = '✅ Visa is VALID and active';
      resultDiv.style.color = 'green';
    } else {
      resultDiv.innerHTML = '❌ Visa not found or invalid (Demo only)';
      resultDiv.style.color = 'red';
    }
  }
</script>

</body>
</html>
